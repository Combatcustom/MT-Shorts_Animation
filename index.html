<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Shorts Customizer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .viewer-container {
            width: 100%;
            max-width: 600px;
            height: 500px;
            background-color: #242424;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        model-viewer {
            width: 100%;
            height: 100%;
        }
        .controls {
            margin-top: 20px;
            color: #ffffff;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="viewer-container">
        <model-viewer 
            id="shorts-viewer" 
            src="MTSHORTSv2.glb" 
            alt="3D Custom Combat Shorts" 
            auto-rotate
            rotation-per-second="30deg"
            shadow-intensity="1">
        </model-viewer>
    </div>

    <div class="controls">
        <h3>Optimized Material Swap Active</h3>
        <p>Satin fabrics and bound logos swapping cleanly.</p>
    </div>

    <script>
        const viewer = document.getElementById('shorts-viewer');

        const designCycle = [
            { color: [0.8, 0.05, 0.05, 1.0], logo: 'black' }, // Red
            { color: [0.05, 0.05, 0.8, 1.0], logo: 'white' }  // Blue
        ];

        let currentIndex = 0;
        let blackLogoTexture, whiteLogoTexture;

        function runCustomizerLoop() {
            if (!viewer.model || !viewer.model.materials) return;

            const currentDesign = designCycle[currentIndex];

            // 1. Swap the fabric color (maintains satin roughness)
            viewer.model.materials.forEach(material => {
                if (material.name !== 'LogoPanel' && material.pbrMetallicRoughness) {
                    material.pbrMetallicRoughness.setBaseColorFactor(currentDesign.color);
                }
            });

            // 2. Swap the pre-loaded textures on the fixed channel
            const logoMaterial = viewer.model.materials.find(m => m.name === 'LogoPanel');
            if (logoMaterial && logoMaterial.pbrMetallicRoughness.baseColorTexture) {
                const targetTexture = currentDesign.logo === 'black' ? blackLogoTexture : whiteLogoTexture;
                logoMaterial.pbrMetallicRoughness.baseColorTexture.setTexture(targetTexture);
            }

            currentIndex = (currentIndex + 1) % designCycle.length;
        }

        viewer.addEventListener('load', async () => {
            console.log("3D Engine Ready. Pre-loading textures...");
            
            // Build the textures one time and hold them in memory
            blackLogoTexture = await viewer.createTexture('logo-kicker-black.png');
            whiteLogoTexture = await viewer.createTexture('logo-kicker-white.png');
            
            console.log("Textures loaded. Starting loops.");
            setInterval(runCustomizerLoop, 1400);
        });
    </script>

</body>
</html>
