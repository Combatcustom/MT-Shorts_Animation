<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CombatCustom Shorts Customizer Loop</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        model-viewer {
            width: 100%;
            height: 90vh;
            max-width: 800px;
            --poster-color: transparent;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="shortsViewer" 
        src="MT SHORTS.glb" 
        alt="CombatCustom Muay Thai Shorts" 
        auto-rotate 
        rotation-per-second="60deg"
        camera-controls 
        camera-target="0m 0.35m 0m"
        interaction-prompt="none"
        shadow-intensity="1">
    </model-viewer>

    <div class="controls-hint">Multi-Color Combo Mode. Cycles every 2 seconds.</div>

    <script>
        const viewer = document.querySelector("#shortsViewer");

        // 🎨 Color Definitions (RGBA format from 0.0 to 1.0)
        const BLACK    = [0.08, 0.08, 0.08, 1.0];
        const GOLD     = [0.85, 0.65, 0.13, 1.0];
        const RED      = [0.8, 0.05, 0.05, 1.0];
        const BLUE     = [0.05, 0.2, 0.7, 1.0];
        const WHITE    = [0.95, 0.95, 0.95, 1.0];
        const CHARCOAL = [0.25, 0.25, 0.25, 1.0];

        // 👔 DESIGN COMBINATIONS LOOP
        // Feel free to tweak these color assignments however you like!
        const designCombos = [
            {
                name: "Combo 1: Stealth Gold",
                body: BLACK,
                waistband: GOLD,
                trim: GOLD,
                logo: BLACK,
                stitching: BLACK
            },
            {
                name: "Combo 2: Classic Muay Thai",
                body: RED,
                waistband: WHITE,
                trim: BLUE,
                logo: WHITE,
                stitching: WHITE
            },
            {
                name: "Combo 3: Royal Trim",
                body: BLUE,
                waistband: BLACK,
                trim: GOLD,
                logo: GOLD,
                stitching: BLACK
            },
            {
                name: "Combo 4: Ice Cold",
                body: WHITE,
                waistband: CHARCOAL,
                trim: BLACK,
                logo: WHITE,
                stitching: CHARCOAL
            }
        ];

        let comboIndex = 0;

        viewer.addEventListener("load", () => {
            const materials = viewer.model.materials;

            // 🎯 Precise targets mapped directly to your screenshot names
            const bodyPanels = ["BackLeftPanel", "BackRightPanel", "MidRightPanel", "MidLeftPanel", "FrontRightPanel", "FrontLeftPanel"];
            const waistbandPanels = ["WaistBand"];
            const trimPanels = ["BottomPiping", "Sidelines"];
            const logoPanels = ["LogoPanel"];
            const stitchingPanels = ["Stitching"];

            // Cycles the setups every 2 seconds
            setInterval(() => {
                const currentCombo = designCombos[comboIndex];

                materials.forEach(material => {
                    // 1. Main Body
                    if (bodyPanels.includes(material.name)) {
                        material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.body);
                    }
                    // 2. WaistBand
                    if (waistbandPanels.includes(material.name)) {
                        material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.waistband);
                    }
                    // 3. Bottom Piping & Sidelines
                    if (trimPanels.includes(material.name)) {
                        material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.trim);
                    }
                    // 4. Logo Patch Area
                    if (logoPanels.includes(material.name)) {
                        material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.logo);
                    }
                    // 5. Thread Stitching
                    if (stitchingPanels.includes(material.name)) {
                        material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.stitching);
                    }
                });

                comboIndex = (comboIndex + 1) % designCombos.length;
            }, 2000);
        });
    </script>
</body>
</html>
