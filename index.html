<html lang="en">

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #3a3a3a 0%, #111111 85%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }
        model-viewer {
            width: 95vw;
            height: 95vh;
            /* Reset transform to let the camera properties handle the perfect center */
            transform: translateY(0%);
            --poster-color: transparent;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            color: #fff;
            font-size: 14px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <model-viewer 
        id="shortsViewer" 
        src="MT SHORTS.glb" 
        alt="CombatCustom Muay Thai Shorts" 
        auto-rotate 
        rotation-per-second="35deg"
        interaction-prompt="none"
        environment-image="neutral"
        exposure="1.2"
        shadow-intensity="1"
        camera-orbit="0deg 86deg 2.1m"
        camera-target="0m 0.12m 0m">
    </model-viewer>

    <div class="controls-hint">CombatCustom Customizer Showcase</div>

    <script>
        const viewer = document.querySelector("#shortsViewer");

        function parseColor(input) {
            const clean = input.trim().toLowerCase();
            if (clean === 'white') return [0.95, 0.95, 0.95, 1.0];
            if (clean === 'black') return [0.03, 0.03, 0.03, 1.0];
            
            const hex = clean.replace('#', '');
            const rSRGB = parseInt(hex.substring(0, 2), 16) / 255;
            const gSRGB = parseInt(hex.substring(2, 4), 16) / 255;
            const bSRGB = parseInt(hex.substring(4, 6), 16) / 255;

            const rLinear = Math.pow(rSRGB, 2.2);
            const gLinear = Math.pow(gSRGB, 2.2);
            const bLinear = Math.pow(bSRGB, 2.2);

            return [rLinear, gLinear, bLinear, 1.0];
        }
