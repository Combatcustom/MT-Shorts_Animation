<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CombatCustom Shorts Customizer Loop</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #3a3a3a 0%, #111111 85%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        model-viewer {
            width: 95vw;
            height: 95vh;
            transform: translateY(-5%);
            --poster-color: transparent;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="shortsViewer" 
        src="MT SHORTS.glb" 
        auto-rotate 
        rotation-per-second="35deg"
        interaction-prompt="none"
        environment-image="neutral"
        exposure="1.2"
        shadow-intensity="1">
    </model-viewer>

    <canvas id="pipelineCanvas" width="1024" height="1024" style="display:none;"></canvas>

    <script>
        const viewer = document.querySelector("#shortsViewer");
        const canvas = document.getElementById("pipelineCanvas");
        const ctx = canvas.getContext("2d");

        function safeColor(hexStr) {
            const clean = hexStr.trim().toLowerCase();
            if (clean === 'white') return [0.95, 0.95, 0.95, 1.0];
            if (clean === 'black') return [0.03, 0.03, 0.03, 1.0];
            
            const hex = clean.replace('#', '');
            if (hex.length !== 6) return [1.0, 1.0, 1.0, 1.0];
            
            const r = parseInt(hex.substring(0, 2), 16) / 255;
            const g = parseInt(hex.substring(2, 4), 16) / 255;
            const b = parseInt(hex.substring(4, 6), 16) / 255;

            return [Math.pow(r, 2.2), Math.pow(g, 2.2), Math.pow(b, 2.2), 1.0];
        }

        const designCombos = [
            { hexBg: "#ffffff", logo: "logo-kicker-black.png", frontLeft: safeColor("#631b1b"), backLeft: safeColor("#631b1b"), midLeft: safeColor("#631b1b"), frontRight: safeColor("#631b1b"), backRight: safeColor("#631b1b"), midRight: safeColor("#631b1b"), waistband: safeColor("#250000"), sidelines: safeColor("white"), logoPanel: safeColor("white"), bottomPiping: safeColor("white"), stitching: safeColor("white") },
            { hexBg: "#4b4b4b", logo: "logo-kicker-white.png", frontLeft: safeColor("#ffbf00"), backLeft: safeColor("#ffbf00"), midLeft: safeColor("#ffbf00"), frontRight: safeColor("#353535"), backRight: safeColor("#353535"), midRight: safeColor("#353535"), waistband: safeColor("#4b4b4b"), sidelines: safeColor("#4b4b4b"), logoPanel: safeColor("#4b4b4b"), bottomPiping: safeColor("white"), stitching: safeColor("black") },
            { hexBg: "#303030", logo: "logo-text-white.png", frontLeft: safeColor("#c3ccec"), backLeft: safeColor("#c3ccec"), midLeft: safeColor("#412727"), frontRight: safeColor("#c3ccec"), backRight: safeColor("#c3ccec"), midRight: safeColor("#412727"), waistband: safeColor("#412727"), sidelines: safeColor("#303030"), logoPanel: safeColor("#303030"), bottomPiping: safeColor("#c3ccec"), stitching: safeColor("black") },
            { hexBg: "#4b4b4b", logo: "logo-kicker-white.png", frontLeft: safeColor("#789678"), backLeft: safeColor("#789678"), midLeft: safeColor("#789678"), frontRight: safeColor("#789678"), backRight: safeColor("#789678"), midRight: safeColor("#789678"), waistband: safeColor("#4b4b4b"), sidelines: safeColor("#4b4b4b"), logoPanel: safeColor("#4b4b4b"), bottomPiping: safeColor("#789678"), stitching: safeColor("black") },
            { hexBg: "#cecece", logo: "logo-text-black.png", frontLeft: safeColor("#331800"), backLeft: safeColor("#331800"), midLeft: safeColor("#331800"), frontRight: safeColor("#9898ac"), backRight: safeColor("#9898ac"), midRight: safeColor("#9898ac"), waistband: safeColor("#9898ac"), sidelines: safeColor("#cecece"), logoPanel: safeColor("#cecece"), bottomPiping: safeColor("#9898ac"), stitching: safeColor("black") },
            { hexBg: "#9b9b9b", logo: "logo-kicker-black.png", frontLeft: safeColor("#020101"), backLeft: safeColor("#020101"), midLeft: safeColor("#202044"), frontRight: safeColor("#020101"), backRight: safeColor("#020101"), midRight: safeColor("#202044"), waistband: safeColor("#020101"), sidelines: safeColor("#020101"), logoPanel: safeColor("#9b9b9b"), bottomPiping: safeColor("#9b9b9b"), stitching: safeColor("white") }
        ];

        let comboIndex = 0;

        function loadImage(src) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.onload = () => resolve(img);
                img.onerror = () => resolve(null);
                img.src = src;
            });
        }

        async function runEngineOverrideLoop() {
            // Find the underlying Three.js scene object properties inside model-viewer
            const modelScene = viewer[Symbol.for('html-properties')].source.value ? viewer : viewer; 
            
            setInterval(async () => {
                const current = designCombos[comboIndex];
                const activeImg = await loadImage(current.logo);

                // 1. Core Canvas Compositing
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = current.hexBg;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (activeImg) {
                    const aspect = activeImg.width / activeImg.height;
                    let drawW = canvas.width * 0.75;
                    let drawH = drawW / aspect;
                    if (drawH > canvas.height) {
                        drawH = canvas.height * 0.75;
                        drawW = drawH * aspect;
                    }
                    ctx.drawImage(activeImg, (canvas.width - drawW) / 2, (canvas.height - drawH) / 2, drawW, drawH);
                }

                // Convert canvas composition into web texture data
                const urlData = canvas.toDataURL("image/png");
                const targetTexture = await viewer.createTexture(urlData);

                // 2. Deep Engine Target Injection
                // Directly searches the raw mesh tree, targeting objects with missing texture maps
                viewer.model.materials.forEach(material => {
                    const name = material.name;

                    if (name === "LogoPanel") {
                        // Force-instantiate ThreeJS texture map options down on the lower runtime tier
                        const threeMaterial = material[Object.getOwnPropertySymbols(material)[0]];
                        
                        if (threeMaterial) {
                            // Link texture straight into the raw WebGL rendering slot
                            material.pbrMetallicRoughness.setBaseColorFactor([1, 1, 1, 1]);
                            
                            if (!material.pbrMetallicRoughness.baseColorTexture) {
                                material.pbrMetallicRoughness.createTextureInfo();
                            }
                            if (material.pbrMetallicRoughness.baseColorTexture && targetTexture) {
                                material.pbrMetallicRoughness.baseColorTexture.setTexture(targetTexture);
                            }
                        }
                    } 
                    // Set color panels
                    else if (name === "FrontLeftPanel") material.pbrMetallicRoughness.setBaseColorFactor(current.frontLeft);
                    else if (name === "BackLeftPanel") material.pbrMetallicRoughness.setBaseColorFactor(current.backLeft);
                    else if (name === "MidLeftPanel") material.pbrMetallicRoughness.setBaseColorFactor(current.midLeft);
                    else if (name === "FrontRightPanel") material.pbrMetallicRoughness.setBaseColorFactor(current.frontRight);
                    else if (name === "BackRightPanel") material.pbrMetallicRoughness.setBaseColorFactor(current.backRight);
                    else if (name === "MidRightPanel") material.pbrMetallicRoughness.setBaseColorFactor(current.midRight);
                    else if (name === "WaistBand") material.pbrMetallicRoughness.setBaseColorFactor(current.waistband);
                    else if (name === "Sidelines") material.pbrMetallicRoughness.setBaseColorFactor(current.sidelines);
                    else if (name === "BottomPiping") material.pbrMetallicRoughness.setBaseColorFactor(current.bottomPiping);
                    else if (name === "Stitching") material.pbrMetallicRoughness.setBaseColorFactor(current.stitching);
                });

                comboIndex = (comboIndex + 1) % designCombos.length;
            }, 1300);
        }

        viewer.addEventListener("load", runEngineOverrideLoop);
    </script>
</body>
</html>
