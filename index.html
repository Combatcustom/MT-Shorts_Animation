<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CombatCustom Shorts Customizer Loop</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }
        model-viewer {
            width: 95vw;
            height: 95vh;
            transform: translateY(4%);
            --poster-color: transparent;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            color: #fff;
            font-size: 14px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <model-viewer 
        id="shortsViewer" 
        src="MT SHORTS.glb" 
        alt="CombatCustom Muay Thai Shorts" 
        auto-rotate 
        rotation-per-second="35deg"
        interaction-prompt="none"
        environment-image="basement_boxing_ring_2k.exr"
        skybox-image="basement_boxing_ring_2k.exr"
        exposure="1.2"
        shadow-intensity="1">
    </model-viewer>

    <div class="controls-hint">CombatCustom Customizer Showcase</div>

    <script>
        const viewer = document.querySelector("#shortsViewer");

        function parseColor(input) {
            const clean = input.trim().toLowerCase();
            if (clean === 'white') return [0.95, 0.95, 0.95, 1.0];
            if (clean === 'black') return [0.03, 0.03, 0.03, 1.0];
            
            const hex = clean.replace('#', '');
            const rSRGB = parseInt(hex.substring(0, 2), 16) / 255;
            const gSRGB = parseInt(hex.substring(2, 4), 16) / 255;
            const bSRGB = parseInt(hex.substring(4, 6), 16) / 255;

            const rLinear = Math.pow(rSRGB, 2.2);
            const gLinear = Math.pow(gSRGB, 2.2);
            const bLinear = Math.pow(bSRGB, 2.2);

            return [rLinear, gLinear, bLinear, 1.0];
        }

        // YOUR 10 GOOGLE SHEET COMBINATIONS
        const designCombos = [
            {
                frontLeft: parseColor("#631b1b"), backLeft: parseColor("#631b1b"), midLeft: parseColor("#631b1b"),
                frontRight: parseColor("#631b1b"), backRight: parseColor("#631b1b"), midRight: parseColor("#631b1b"),
                waistband: parseColor("#250000"), sidelines: parseColor("White"), logoPanel: parseColor("White"),
                bottomPiping: parseColor("white"), stitching: parseColor("White")
            },
            {
                frontLeft: parseColor("#ffbf00"), backLeft: parseColor("#ffbf00"), midLeft: parseColor("#ffbf00"),
                frontRight: parseColor("#353535"), backRight: parseColor("#353535"), midRight: parseColor("#353535"),
                waistband: parseColor("#4b4b4b"), sidelines: parseColor("#4b4b4b"), logoPanel: parseColor("#4b4b4b"),
                bottomPiping: parseColor("White"), stitching: parseColor("black")
            },
            {
                frontLeft: parseColor("#c3ccec"), backLeft: parseColor("#c3ccec"), midLeft: parseColor("#412727"),
                frontRight: parseColor("#c3ccec"), backRight: parseColor("#c3ccec"), midRight: parseColor("#412727"),
                waistband: parseColor("#412727"), sidelines: parseColor("#303030"), logoPanel: parseColor("#303030"),
                bottomPiping: parseColor("#c3ccec"), stitching: parseColor("black")
            },
            {
                frontLeft: parseColor("#789678"), backLeft: parseColor("#789678"), midLeft: parseColor("#789678"),
                frontRight: parseColor("#789678"), backRight: parseColor("#789678"), midRight: parseColor("#789678"),
                waistband: parseColor("#4b4b4b"), sidelines: parseColor("#4b4b4b"), logoPanel: parseColor("#4b4b4b"),
                bottomPiping: parseColor("#789678"), stitching: parseColor("black")
            },
            {
                frontLeft: parseColor("#331800"), backLeft: parseColor("#331800"), midLeft: parseColor("#331800"),
                frontRight: parseColor("#9898ac"), backRight: parseColor("#9898ac"), midRight: parseColor("#9898ac"),
                waistband: parseColor("#9898ac"), sidelines: parseColor("#cecece"), logoPanel: parseColor("#cecece"),
                bottomPiping: parseColor("#9898ac"), stitching: parseColor("black")
            },
            {
                frontLeft: parseColor("#020101"), backLeft: parseColor("#020101"), midLeft: parseColor("#202044"),
                frontRight: parseColor("#020101"), backRight: parseColor("#020101"), midRight: parseColor("#202044"),
                waistband: parseColor("#020101"), sidelines: parseColor("#020101"), logoPanel: parseColor("#9b9b9b"),
                bottomPiping: parseColor("#9b9b9b"), stitching: parseColor("white")
            },
            {
                frontLeft: parseColor("#b9a973"), backLeft: parseColor("#b9a973"), midLeft: parseColor("#b9a973"),
                frontRight: parseColor("#b9a973"), backRight: parseColor("#b9a973"), midRight: parseColor("#b9a973"),
                waistband: parseColor("#0f2c0f"), sidelines: parseColor("#0f2c0f"), logoPanel: parseColor("#9b9b9b"),
                bottomPiping: parseColor("#9b9b9b"), stitching: parseColor("Black")
            },
            {
                frontLeft: parseColor("#446970"), backLeft: parseColor("#446970"), midLeft: parseColor("#446970"),
                frontRight: parseColor("#bebebe"), backRight: parseColor("#bebebe"), midRight: parseColor("#bebebe"),
                waistband: parseColor("#bebebe"), sidelines: parseColor("#1c2513"), logoPanel: parseColor("#1c2513"),
                bottomPiping: parseColor("black"), stitching: parseColor("white")
            },
            {
                frontLeft: parseColor("#c58c9c"), backLeft: parseColor("#c58c9c"), midLeft: parseColor("#5f5f80"),
                frontRight: parseColor("#c58c9c"), backRight: parseColor("#c58c9c"), midRight: parseColor("#5f5f80"),
                waistband: parseColor("#5f5f80"), sidelines: parseColor("#b6b6b6"), logoPanel: parseColor("#b6b6b6"),
                bottomPiping: parseColor("#b6b6b6"), stitching: parseColor("white")
            },
            {
                frontLeft: parseColor("#0a0030"), backLeft: parseColor("#0a0030"), midLeft: parseColor("#0a0030"),
                frontRight: parseColor("#0a0030"), backRight: parseColor("#0a0030"), midRight: parseColor("#0a0030"),
                waistband: parseColor("#5f504f"), sidelines: parseColor("#5f504f"), logoPanel: parseColor("black"),
                bottomPiping: parseColor("white"), stitching: parseColor("black")
            }
        ];

        let comboIndex = 0;

        function startColorLoop() {
            const materials = viewer.model.materials;

            materials.forEach(material => {
                if (["FrontLeftPanel", "BackLeftPanel", "FrontRightPanel", "BackRightPanel", "MidLeftPanel", "MidRightPanel", "WaistBand"].includes(material.name)) {
                    material.pbrMetallicRoughness.setRoughnessFactor(0.65); 
                    material.pbrMetallicRoughness.setMetallicFactor(0.15); 
                }
                if (["BottomPiping", "Sidelines"].includes(material.name)) {
                    material.pbrMetallicRoughness.setRoughnessFactor(1.0);  
                    material.pbrMetallicRoughness.setMetallicFactor(0.0);   
                }
            });

            setInterval(() => {
                const current = designCombos[comboIndex];

                materials.forEach(material => {
                    switch (material.name) {
                        case "FrontLeftPanel":  material.pbrMetallicRoughness.setBaseColorFactor(current.frontLeft); break;
                        case "BackLeftPanel":   material.pbrMetallicRoughness.setBaseColorFactor(current.backLeft); break;
                        case "MidLeftPanel":    material.pbrMetallicRoughness.setBaseColorFactor(current.midLeft); break;
                        case "FrontRightPanel": material.pbrMetallicRoughness.setBaseColorFactor(current.frontRight); break;
                        case "BackRightPanel":  material.pbrMetallicRoughness.setBaseColorFactor(current.backRight); break;
                        case "MidRightPanel":   material.pbrMetallicRoughness.setBaseColorFactor(current.midRight); break;
                        case "WaistBand":       material.pbrMetallicRoughness.setBaseColorFactor(current.waistband); break;
                        case "Sidelines":       material.pbrMetallicRoughness.setBaseColorFactor(current.sidelines); break;
                        case "LogoPanel":       material.pbrMetallicRoughness.setBaseColorFactor(current.logoPanel); break;
                        case "BottomPiping":    material.pbrMetallicRoughness.setBaseColorFactor(current.bottomPiping); break;
                        case "Stitching":       material.pbrMetallicRoughness.setBaseColorFactor(current.stitching); break;
                    }
                });

                comboIndex = (comboIndex + 1) % designCombos.length;
            }, 1200);
        }

        if (viewer.loaded) {
            startColorLoop();
        } else {
            viewer.addEventListener("load", startColorLoop);
        }
    </script>
</body>
</html>
