<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Shorts Customizer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .viewer-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 500px;
            background-color: #242424;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        model-viewer {
            width: 100%;
            height: 100%;
        }

        .controls {
            margin-top: 20px;
            color: #ffffff;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="viewer-container">
        <model-viewer 
            id="shorts-viewer" 
            src="MT SHORTS.glb" 
            alt="3D Custom Combat Shorts" 
            auto-rotate
            rotation-per-second="-25deg"
            shadow-intensity="1">
        </model-viewer>
    </div>

    <div class="controls">
        <h3>Material Mapping Active</h3>
        <p>Satin fabrics and logos synchronized perfectly.</p>
    </div>

    <script>
        const viewer = document.getElementById('shorts-viewer');

        // Color and texture configuration data array
        const designCycle = [
            { color: [0.8, 0.05, 0.05, 1.0], logo: 'logo-kicker-black.png' }, // Red
            { color: [0.05, 0.05, 0.8, 1.0], logo: 'logo-kicker-white.png' }  // Blue
        ];

        let currentIndex = 0;

        async function runCustomizerLoop() {
            if (!viewer.model || !viewer.model.materials) return;

            const currentDesign = designCycle[currentIndex];

            // 1. Target and adjust fabric colors without overwriting original roughness/satin settings
            viewer.model.materials.forEach(material => {
                if (material.name !== 'LogoPanel' && material.pbrMetallicRoughness) {
                    material.pbrMetallicRoughness.setBaseColorFactor(currentDesign.color);
                }
            });

            // 2. Safely generate and assign the 3D texture mapping to the LogoPanel material channel
            const logoMaterial = viewer.model.materials.find(m => m.name === 'LogoPanel');
            if (logoMaterial) {
                try {
                    // Create texture directly via Model Viewer internal engine tools
                    const newTexture = await viewer.createTexture(currentDesign.logo);
                    
                    if (logoMaterial.pbrMetallicRoughness) {
                        // Force texture channel visibility activation
                        if (logoMaterial.pbrMetallicRoughness.baseColorTexture) {
                            logoMaterial.pbrMetallicRoughness.baseColorTexture.setTexture(newTexture);
                        } else {
                            // Backup map attachment fallback sequence if texture sampler track was unassigned
                            logoMaterial.createTextureInfo("baseColorTexture");
                            logoMaterial.pbrMetallicRoughness.baseColorTexture.setTexture(newTexture);
                        }
                    }
                } catch (err) {
                    console.error("Texture compilation failure:", err);
                }
            }

            currentIndex = (currentIndex + 1) % designCycle.length;
        }

        // Initialize loops as soon as the model asset loading pipeline clears
        viewer.addEventListener('load', () => {
            console.log("3D engine ready. Dynamic pipeline loops executing...");
            setInterval(runCustomizerLoop, 1400);
        });
    </script>

</body>
</html>
