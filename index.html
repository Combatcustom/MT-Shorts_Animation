    <title>CombatCustom Shorts Customizer Loop</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #3a3a3a 0%, #111111 85%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }
        model-viewer {
            width: 95vw;
            height: 95vh;
            transform: translateY(-5%);
            --poster-color: transparent;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            color: #fff;
            font-size: 14px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
    </style>
</head>

        src="MT SHORTS.glb"

        interaction-prompt="none"
        environment-image="neutral"
        exposure="1.2"
        shadow-intensity="1">
