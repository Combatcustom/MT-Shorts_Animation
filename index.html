<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Shorts Customizer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Container to stack the viewer and logo perfectly */
        .viewer-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 500px;
            background-color: #242424;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        model-viewer {
            width: 100%;
            height: 100%;
        }

        /* The Logo Overlay Sticker placed precisely over the waistband patch */
        .logo-overlay {
            position: absolute;
            top: 29.5%; /* Centers it vertically on the patch */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 32px; /* Adjusted size to fit the waistband panel neatly */
            height: auto;
            pointer-events: none; /* Keeps it completely non-interactive */
            z-index: 10;
        }

        .controls {
            margin-top: 20px;
            color: #ffffff;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="viewer-container">
        <model-viewer 
            id="shorts-viewer" 
            src="MT SHORTS.glb" 
            alt="3D Custom Combat Shorts" 
            auto-rotate
            rotation-per-second="30deg"
            shadow-intensity="1">
        </model-viewer>
        
        <img id="custom-logo" class="logo-overlay" src="logo-kicker-black.png" alt="Logo Layer">
    </div>

    <div class="controls">
        <h3>Customizer Loop Active</h3>
        <p>Swapping all fabric panels and logos every 1.4 seconds.</p>
    </div>

    <script>
        const viewer = document.getElementById('shorts-viewer');
        const logoImg = document.getElementById('custom-logo');

        // Combined asset loop layout configuration
        const designCycle = [
            { color: [0.8, 0.1, 0.1, 1.0], logo: 'logo-kicker-black.png' }, // Red shorts / Black Logo
            { color: [0.1, 0.1, 0.8, 1.0], logo: 'logo-kicker-white.png' }  // Blue shorts / White Logo
        ];

        let currentIndex = 0;

        function runCustomizerLoop() {
            if (!viewer.model || !viewer.model.materials) return;

            const currentDesign = designCycle[currentIndex];

            // 1. Loop through ALL materials on the file so the whole short shifts color
            viewer.model.materials.forEach(material => {
                // Skip the waistband logo panel so it stays white/neutral background
                if (material.name !== 'LogoPanel' && material.pbrMetallicRoughness) {
                    material.pbrMetallicRoughness.setBaseColorFactor(currentDesign.color);
                }
            });

            // 2. Swap the logo layer source
            logoImg.src = currentDesign.logo;

            currentIndex = (currentIndex + 1) % designCycle.length;
        }

        // Initialize once model data passes validation
        viewer.addEventListener('load', () => {
            console.log("3D engine ready. Global panel sync active.");
            setInterval(runCustomizerLoop, 1400);
        });
    </script>

</body>
</html>
