<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Shorts Customizer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Container to stack the viewer and logo perfectly */
        .viewer-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 500px;
            background-color: #242424;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        model-viewer {
            width: 100%;
            height: 100%;
        }

        /* The Logo Overlay Sticker placed precisely over the waistband patch */
        .logo-overlay {
            position: absolute;
            top: 29.5%; /* Centers it vertically on the patch */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75px; /* Adjust size to fit the panel neatly */
            height: auto;
            pointer-events: none; /* Allows user to drag the 3D model through the image */
            z-index: 10;
            transition: opacity 0.2s ease-in-out;
        }

        .controls {
            margin-top: 20px;
            color: #ffffff;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="viewer-container">
        <model-viewer 
            id="shorts-viewer" 
            src="MT SHORTS.glb" 
            alt="3D Custom Combat Shorts" 
            camera-controls
            shadow-intensity="1">
        </model-viewer>
        
        <img id="custom-logo" class="logo-overlay" src="logo-kicker-black.png" alt="Logo Layer">
    </div>

    <div class="controls">
        <h3>Customizer Loop Active</h3>
        <p>Swapping fabric colors and screen logos every 1.4 seconds.</p>
    </div>

    <script>
        const viewer = document.getElementById('shorts-viewer');
        const logoImg = document.getElementById('custom-logo');

        // Combined asset loop layout configuration
        const designCycle = [
            { color: [0.8, 0.1, 0.1, 1.0], logo: 'logo-kicker-black.png' }, // Red shorts / Black Logo
            { color: [0.1, 0.1, 0.8, 1.0], logo: 'logo-kicker-white.png' }  // Blue shorts / White Logo
        ];

        let currentIndex = 0;

        function runCustomizerLoop() {
            if (!viewer.model || !viewer.model.materials) return;

            const currentDesign = designCycle[currentIndex];

            // 1. Swap the fabric color on the 3D model panels natively
            const baseMaterial = viewer.model.materials.find(m => m.name === 'FrontLeftPanel');
            if (baseMaterial) {
                baseMaterial.pbrMetallicRoughness.setBaseColorFactor(currentDesign.color);
            }

            // 2. Safely swap the logo layer source on top of the 3D viewer frame
            logoImg.src = currentDesign.logo;

            currentIndex = (currentIndex + 1) % designCycle.length;
        }

        // Initialize once model data passes validation
        viewer.addEventListener('load', () => {
            console.log("3D engine ready. Screen synchronization active.");
            setInterval(runCustomizerLoop, 1400);
        });
    </script>

</body>
</html>
