<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CombatCustom Shorts Customizer Loop</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #3a3a3a 0%, #111111 85%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }
        model-viewer {
            width: 95vw;
            height: 95vh;
            transform: translateY(-5%);
            --poster-color: transparent;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            color: #fff;
            font-size: 14px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <model-viewer 
        id="shortsViewer" 
        src="MT SHORTS.glb" 
        alt="CombatCustom Muay Thai Shorts" 
        auto-rotate 
        rotation-per-second="35deg"
        interaction-prompt="none"
        environment-image="neutral"
        exposure="1.2"
        shadow-intensity="1">
    </model-viewer>

    <div class="controls-hint">CombatCustom Customizer Showcase</div>

    <script>
        const viewer = document.querySelector("#shortsViewer");

        // Safe Hex-to-RGB array converter for 3D engine
        function safeColor(hexStr) {
            const clean = hexStr.trim().toLowerCase();
            if (clean === 'white') return [0.95, 0.95, 0.95, 1.0];
            if (clean === 'black') return [0.03, 0.03, 0.03, 1.0];
            
            const hex = clean.replace('#', '');
            if (hex.length !== 6) return [1.0, 1.0, 1.0, 1.0]; // Fallback to white if broken
            
            const r = parseInt(hex.substring(0, 2), 16) / 255;
            const g = parseInt(hex.substring(2, 4), 16) / 255;
            const b = parseInt(hex.substring(4, 6), 16) / 255;

            // Convert sRGB to Linear space for WebGL rendering
            return [Math.pow(r, 2.2), Math.pow(g, 2.2), Math.pow(b, 2.2), 1.0];
        }

        // ALL 12 COLOR COMBINATIONS FROM YOUR DESIGN SHEET
        const designCombos = [
            {
                frontLeft: safeColor("#631b1b"), backLeft: safeColor("#631b1b"), midLeft: safeColor("#631b1b"),
                frontRight: safeColor("#631b1b"), backRight: safeColor("#631b1b"), midRight: safeColor("#631b1b"),
                waistband: safeColor("#250000"), sidelines: safeColor("white"), logoPanel: safeColor("white"),
                bottomPiping: safeColor("white"), stitching: safeColor("white"), useWhiteLogo: false
            },
            {
                frontLeft: safeColor("#ffbf00"), backLeft: safeColor("#ffbf00"), midLeft: safeColor("#ffbf00"),
                frontRight: safeColor("#353535"), backRight: safeColor("#353535"), midRight: safeColor("#353535"),
                waistband: safeColor("#4b4b4b"), sidelines: safeColor("#4b4b4b"), logoPanel: safeColor("#4b4b4b"),
                bottomPiping: safeColor("white"), stitching: safeColor("black"), useWhiteLogo: true
            },
            {
                frontLeft: safeColor("#c3ccec"), backLeft: safeColor("#c3ccec"), midLeft: safeColor("#412727"),
                frontRight: safeColor("#c3ccec"), backRight: safeColor("#c3ccec"), midRight: safeColor("#412727"),
                waistband: safeColor("#412727"), sidelines: safeColor("#303030"), logoPanel: safeColor("#303030"),
                bottomPiping: safeColor("#c3ccec"), stitching: safeColor("black"), useWhiteLogo: true
            },
            {
                frontLeft: safeColor("#789678"), backLeft: safeColor("#789678"), midLeft: safeColor("#789678"),
                frontRight: safeColor("#789678"), backRight: safeColor("#789678"), midRight: safeColor("#789678"),
                waistband: safeColor("#4b4b4b"), sidelines: safeColor("#4b4b4b"), logoPanel: safeColor("#4b4b4b"),
                bottomPiping: safeColor("#789678"), stitching: safeColor("black"), useWhiteLogo: true
            },
            {
                frontLeft: safeColor("#331800"), backLeft: safeColor("#331800"), midLeft: safeColor("#331800"),
                frontRight: safeColor("#9898ac"), backRight: safeColor("#9898ac"), midRight: safeColor("#9898ac"),
                waistband: safeColor("#9898ac"), sidelines: safeColor("#cecece"), logoPanel: safeColor("#cecece"),
                bottomPiping: safeColor("#9898ac"), stitching: safeColor("black"), useWhiteLogo: false
            },
            {
                frontLeft: safeColor("#020101"), backLeft: safeColor("#020101"), midLeft: safeColor("#202044"),
                frontRight: safeColor("#020101"), backRight: safeColor("#020101"), midRight: safeColor("#202044"),
                waistband: safeColor("#020101"), sidelines: safeColor("#020101"), logoPanel: safeColor("#9b9b9b"),
                bottomPiping: safeColor("#9b9b9b"), stitching: safeColor("white"), useWhiteLogo: false
            },
            {
                frontLeft: safeColor("#b9a973"), backLeft: safeColor("#b9a973"), midLeft: safeColor("#b9a973"),
                frontRight: safeColor("#b9a973"), backRight: safeColor("#b9a973"), midRight: safeColor("#b9a973"),
                waistband: safeColor("#0f2c0f"), sidelines: safeColor("#0f2c0f"), logoPanel: safeColor("#9b9b9b"),
                bottomPiping: safeColor("#9b9b9b"), stitching: safeColor("black"), useWhiteLogo: false
            },
            {
                frontLeft: safeColor("#446970"), backLeft: safeColor("#446970"), midLeft: safeColor("#446970"),
                frontRight: safeColor("#bebebe"), backRight: safeColor("#bebebe"), midRight: safeColor("#bebebe"),
                waistband: safeColor("#bebebe"), sidelines: safeColor("#1c2513"), logoPanel: safeColor("#1c2513"),
                bottomPiping: safeColor("black"), stitching: safeColor("white"), useWhiteLogo: true
            },
            {
                frontLeft: safeColor("#c58c9c"), backLeft: safeColor("#c58c9c"), midLeft: safeColor("#5f5f80"),
                frontRight: safeColor("#c58c9c"), backRight: safeColor("#c58c9c"), midRight: safeColor("#5f5f80"),
                waistband: safeColor("#5f504f"), sidelines: safeColor("#b6b6b6"), logoPanel: safeColor("#b6b6b6"),
                bottomPiping: safeColor("#b6b6b6"), stitching: safeColor("white"), useWhiteLogo: false
            },
            {
                frontLeft: safeColor("#0a0030"), backLeft: safeColor("#0a0030"), midLeft: safeColor("#0a0030"),
                frontRight: safeColor("#0a0030"), backRight: safeColor("#0a0030"), midRight: safeColor("#0a0030"),
                waistband: safeColor("#5f504f"), sidelines: safeColor("#5f504f"), logoPanel: safeColor("black"),
                bottomPiping: safeColor("white"), stitching: safeColor("black"), useWhiteLogo: true
            },
            {
                frontLeft: safeColor("#2e4b2e"), backLeft: safeColor("#2e4b2e"), midLeft: safeColor("#2e4b2e"),
                frontRight: safeColor("#aa0000"), backRight: safeColor("#aa0000"), midRight: safeColor("#aa0000"),
                waistband: safeColor("white"), sidelines: safeColor("white"), logoPanel: safeColor("#2f2d38"),
                bottomPiping: safeColor("white"), stitching: safeColor("white"), useWhiteLogo: true
            },
            {
                frontLeft: safeColor("#ff7633"), backLeft: safeColor("#ff7633"), midLeft: safeColor("#9898ac"),
                frontRight: safeColor("#ff7633"), backRight: safeColor("#ff7633"), midRight: safeColor("#9898ac"),
                waistband: safeColor("#9898ac"), sidelines: safeColor("#301c1c"), logoPanel: safeColor("#301c1c"),
                bottomPiping: safeColor("white"), stitching: safeColor("black"), useWhiteLogo: true
            }
        ];

        let comboIndex = 0;

        async function startColorAndBrandLoop() {
            const materials = viewer.model.materials;
            
            // This displays your actual GLB mesh names directly in the console!
            console.log("📋 EXACT MATERIAL NAMES FOUND IN YOUR GLB FILE:", materials.map(m => m.name));

            // Load textures inside separate try/catch blocks so one error won't break everything
            let texKickerBlack, texKickerWhite, texTextBlack, texTextWhite;
            
            try { texKickerBlack = await viewer.createTexture("Combat Custom_Kicker Logo_Black Clear BG.png"); } 
            catch(e) { console.warn("Missing Image: Kicker Black"); }
            
            try { texKickerWhite = await viewer.createTexture("Combat Custom_Kicker Logo_White Clear BG.png"); } 
            catch(e) { console.warn("Missing Image: Kicker White"); }
            
            try { texTextBlack = await viewer.createTexture("CC_Main Logo_BLACK_V2.png"); } 
            catch(e) { console.warn("Missing Image: Main Logo Black"); }
            
            try { texTextWhite = await viewer.createTexture("CC_Main Logo_WHITE_V2.png"); } 
            catch(e) { console.warn("Missing Image: Main Logo White"); }

            setInterval(() => {
                const current = designCombos[comboIndex];

                // 1. Color Application Logic
                materials.forEach(material => {
                    const name = material.name.toLowerCase();

                    if (name.includes("frontleft")) material.pbrMetallicRoughness.setBaseColorFactor(current.frontLeft);
                    else if (name.includes("backleft")) material.pbrMetallicRoughness.setBaseColorFactor(current.backLeft);
                    else if (name.includes("midleft")) material.pbrMetallicRoughness.setBaseColorFactor(current.midLeft);
                    else if (name.includes("frontright")) material.pbrMetallicRoughness.setBaseColorFactor(current.frontRight);
                    else if (name.includes("backright")) material.pbrMetallicRoughness.setBaseColorFactor(current.backRight);
                    else if (name.includes("midright")) material.pbrMetallicRoughness.setBaseColorFactor(current.midRight);
                    else if (name.includes("waistband") || name.includes("waist")) material.pbrMetallicRoughness.setBaseColorFactor(current.waistband);
                    else if (name.includes("sideline")) material.pbrMetallicRoughness.setBaseColorFactor(current.sidelines);
                    else if (name.includes("logopanel") || name.includes("logo") || name.includes("patch")) material.pbrMetallicRoughness.setBaseColorFactor(current.logoPanel);
                    else if (name.includes("bottompiping") || name.includes("piping")) material.pbrMetallicRoughness.setBaseColorFactor(current.bottomPiping);
                    else if (name.includes("stitching") || name.includes("stitch")) material.pbrMetallicRoughness.setBaseColorFactor(current.stitching);

                    // Set Premium Satin finish profile to panels AND sidelines
                    if (name.includes("panel") || name.includes("waist") || name.includes("sideline") || name.includes("logo") || name.includes("patch")) {
                        material.pbrMetallicRoughness.setRoughnessFactor(0.65); 
                        material.pbrMetallicRoughness.setMetallicFactor(0.15); 
                    }
                    if (name.includes("piping")) {
                        material.pbrMetallicRoughness.setRoughnessFactor(1.0);  
                        material.pbrMetallicRoughness.setMetallicFactor(0.0);   
                    }
                });

                // 2. Safely Swap Brand Textures without throwing crashes
                const isEven = (comboIndex % 2 === 0);
                let activeTex = null;

                if (isEven) {
                    activeTex = current.useWhiteLogo ? texKickerWhite : texKickerBlack;
                } else {
                    activeTex = current.useWhiteLogo ? texTextWhite : texTextBlack;
                }

                // Apply image map to any layer matching our branding terms
                if (activeTex) {
                    materials.forEach(material => {
                        const name = material.name.toLowerCase();
                        if (name.includes("logo") || name.includes("patch") || name.includes("label") || name.includes("brand")) {
                            if (material.pbrMetallicRoughness.baseColorTexture) {
                                material.pbrMetallicRoughness.baseColorTexture.setTexture(activeTex);
                            }
                        }
                    });
                }

                comboIndex = (comboIndex + 1) % designCombos.length;
            }, 1200);
        }

        if (viewer.loaded) {
            startColorAndBrandLoop();
        } else {
            viewer.addEventListener("load", startColorAndBrandLoop);
        }
    </script>
</body>
</html>
