<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CombatCustom Shorts Customizer Loop</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }
        model-viewer {
            width: 95vw;
            height: 95vh;
            transform: translateY(4%);
            --poster-color: transparent;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="shortsViewer" 
        src="MT SHORTS.glb" 
        alt="CombatCustom Muay Thai Shorts" 
        auto-rotate 
        rotation-per-second="35deg"
        interaction-prompt="none"
        shadow-intensity="1">
    </model-viewer>

    <div class="controls-hint">Premium Customizer Showcase. 10 Colorways. Speed: 1.2s</div>

    <script>
        const viewer = document.querySelector("#shortsViewer");

        // 🎨 Premium Combat Color Palette (RGBA format from 0.0 to 1.0)
        const BLACK        = [0.08, 0.08, 0.08, 1.0];
        const CHARCOAL     = [0.22, 0.22, 0.22, 1.0];
        const WHITE        = [0.95, 0.95, 0.95, 1.0];
        const GOLD         = [0.85, 0.65, 0.13, 1.0];
        const CRIMSON      = [0.75, 0.02, 0.02, 1.0];
        const NAVY         = [0.02, 0.12, 0.35, 1.0];
        const MILITARY_OD  = [0.22, 0.28, 0.18, 1.0];
        const PURPLE       = [0.25, 0.05, 0.45, 1.0];
        const TROPIC_TEAL  = [0.0, 0.55, 0.55, 1.0];
        const ELECTRIC_ORANGE = [0.95, 0.35, 0.0, 1.0];
        const NEON_YELLOW  = [0.85, 0.95, 0.0, 1.0];

        // 👔 10 DISTINCT HIGH-VARIETY DESIGN COMBOS
        const designCombos = [
            {
                name: "1. Onyx Gold",
                leftPanels: BLACK, rightPanels: BLACK, midLeft: BLACK, midRight: BLACK,
                waistband: GOLD, trim: GOLD, logo: BLACK, stitching: GOLD
            },
            {
                name: "2. Crimson split Onyx",
                leftPanels: CRIMSON, rightPanels: BLACK, midLeft: CRIMSON, midRight: BLACK,
                waistband: CHARCOAL, trim: GOLD, logo: WHITE, stitching: CRIMSON
            },
            {
                name: "3. Spec-Ops Olive",
                leftPanels: MILITARY_OD, rightPanels: MILITARY_OD, midLeft: MILITARY_OD, midRight: MILITARY_OD,
                waistband: BLACK, trim: CHARCOAL, logo: BLACK, stitching: WHITE
            },
            {
                name: "4. Cyberpunk Split",
                leftPanels: CHARCOAL, rightPanels: PURPLE, midLeft: CHARCOAL, midRight: PURPLE,
                waistband: BLACK, trim: NEON_YELLOW, logo: NEON_YELLOW, stitching: PURPLE
            },
            {
                name: "5. Royal Anchor",
                leftPanels: NAVY, rightPanels: NAVY, midLeft: NAVY, midRight: NAVY,
                waistband: GOLD, trim: WHITE, logo: NAVY, stitching: GOLD
            },
            {
                name: "6. Sunset Eclipse Split",
                leftPanels: BLACK, rightPanels: ELECTRIC_ORANGE, midLeft: BLACK, midRight: ELECTRIC_ORANGE,
                waistband: CHARCOAL, trim: BLACK, logo: WHITE, stitching: ELECTRIC_ORANGE
            },
            {
                name: "7. Pharaoh Purple",
                leftPanels: PURPLE, rightPanels: PURPLE, midLeft: PURPLE, midRight: PURPLE,
                waistband: GOLD, trim: GOLD, logo: BLACK, stitching: WHITE
            },
            {
                name: "8. Glacier Frost Split",
                leftPanels: WHITE, rightPanels: NAVY, midLeft: WHITE, midRight: NAVY,
                waistband: BLACK, trim: CRIMSON, logo: WHITE, stitching: NAVY
            },
            {
                name: "9. Miami Coral",
                leftPanels: TROPIC_TEAL, rightPanels: TROPIC_TEAL, midLeft: TROPIC_TEAL, midRight: TROPIC_TEAL,
                waistband: BLACK, trim: ELECTRIC_ORANGE, logo: WHITE, stitching: TROPIC_TEAL
            },
            {
                name: "10. Bloodsport Split",
                leftPanels: CRIMSON, rightPanels: NAVY, midLeft: CRIMSON, midRight: NAVY,
                waistband: GOLD, trim: WHITE, logo: CRIMSON, stitching: WHITE
            }
        ];

        let comboIndex = 0;

        // Core execution function wrapped safely to run whenever ready
        function startColorLoop() {
            const materials = viewer.model.materials;

            const leftSide = ["FrontLeftPanel", "BackLeftPanel"];
            const rightSide = ["FrontRightPanel", "BackRightPanel"];
            const midLeftPanel = ["MidLeftPanel"];
            const midRightPanel = ["MidRightPanel"];
            const waistbandPanels = ["WaistBand"];
            const trimPanels = ["BottomPiping", "Sidelines"];
            const logoPanels = ["LogoPanel"];
            const stitchingPanels = ["Stitching"];

            setInterval(() => {
                const currentCombo = designCombos[comboIndex];

                materials.forEach(material => {
                    if (leftSide.includes(material.name)) material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.leftPanels);
                    if (rightSide.includes(material.name)) material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.rightPanels);
                    if (midLeftPanel.includes(material.name)) material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.midLeft);
                    if (midRightPanel.includes(material.name)) material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.midRight);
                    if (waistbandPanels.includes(material.name)) material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.waistband);
                    if (trimPanels.includes(material.name)) material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.trim);
                    if (logoPanels.includes(material.name)) material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.logo);
                    if (stitchingPanels.includes(material.name)) material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.stitching);
                });

                comboIndex = (comboIndex + 1) % designCombos.length;
            }, 1200);
        }

        // ⚡ Anti-Race Condition Check: Run instantly if already cached, otherwise listen for load
        if (viewer.loaded) {
            startColorLoop();
        } else {
            viewer.addEventListener("load", startColorLoop);
        }
    </script>
</body>
</html>
