<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CombatCustom Shorts Customizer Loop</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }
        model-viewer {
            width: 95vw;
            height: 95vh;
            transform: translateY(4%);
            --poster-color: transparent;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="shortsViewer" 
        src="MT SHORTS.glb" 
        alt="CombatCustom Muay Thai Shorts" 
        auto-rotate 
        rotation-per-second="35deg"
        interaction-prompt="none"
        shadow-intensity="1">
    </model-viewer>

    <div class="controls-hint">Smooth Spin Mode. Colors Changing Fast.</div>

    <script>
        const viewer = document.querySelector("#shortsViewer");

        // 🎨 Color Palette Definitions (RGBA format from 0.0 to 1.0)
        const BLACK      = [0.08, 0.08, 0.08, 1.0];
        const GOLD       = [0.85, 0.65, 0.13, 1.0];
        const RED        = [0.8, 0.05, 0.05, 1.0];
        const BLUE       = [0.05, 0.2, 0.7, 1.0];
        const WHITE      = [0.95, 0.95, 0.95, 1.0];
        const CHARCOAL   = [0.25, 0.25, 0.25, 1.0];
        const NEON_GREEN = [0.1, 0.85, 0.1, 1.0];
        const ORANGE     = [0.9, 0.4, 0.0, 1.0];

        // 👔 Current 8-Stage Design Loop
        const designCombos = [
            {
                name: "Combo 1: Stealth Gold (Solid)",
                leftPanels: BLACK, rightPanels: BLACK, midLeft: BLACK, midRight: BLACK,
                waistband: GOLD, trim: GOLD, logo: BLACK, stitching: BLACK
            },
            {
                name: "Combo 2: Fire & Ice (Split)",
                leftPanels: BLUE, rightPanels: RED, midLeft: BLUE, midRight: RED,
                waistband: BLACK, trim: WHITE, logo: WHITE, stitching: WHITE
            },
            {
                name: "Combo 3: Classic Muay Thai (Solid)",
                leftPanels: RED, rightPanels: RED, midLeft: RED, midRight: RED,
                waistband: WHITE, trim: BLUE, logo: WHITE, stitching: WHITE
            },
            {
                name: "Combo 4: Tokyo Neon (Split)",
                leftPanels: CHARCOAL, rightPanels: NEON_GREEN, midLeft: CHARCOAL, midRight: NEON_GREEN,
                waistband: BLACK, trim: BLACK, logo: NEON_GREEN, stitching: BLACK
            },
            {
                name: "Combo 5: Royal Gold (Solid)",
                leftPanels: BLUE, rightPanels: BLUE, midLeft: BLUE, midRight: BLUE,
                waistband: BLACK, trim: GOLD, logo: GOLD, stitching: BLACK
            },
            {
                name: "Combo 6: Tiger Spirit (Split)",
                leftPanels: ORANGE, rightPanels: BLACK, midLeft: ORANGE, midRight: BLACK,
                waistband: GOLD, trim: WHITE, logo: BLACK, stitching: GOLD
            },
            {
                name: "Combo 7: Monochrome Ice (Solid)",
                leftPanels: WHITE, rightPanels: WHITE, midLeft: WHITE, midRight: WHITE,
                waistband: CHARCOAL, trim: BLACK, logo: WHITE, stitching: CHARCOAL
            },
            {
                name: "Combo 8: Electric Candy (Split)",
                leftPanels: BLUE, rightPanels: ORANGE, midLeft: BLUE, midRight: ORANGE,
                waistband: WHITE, trim: BLACK, logo: BLUE, stitching: WHITE
            }
        ];

        let comboIndex = 0;

        viewer.addEventListener("load", () => {
            const materials = viewer.model.materials;

            const leftSide = ["FrontLeftPanel", "BackLeftPanel"];
            const rightSide = ["FrontRightPanel", "BackRightPanel"];
            const midLeftPanel = ["MidLeftPanel"];
            const midRightPanel = ["MidRightPanel"];
            
            const waistbandPanels = ["WaistBand"];
            const trimPanels = ["BottomPiping", "Sidelines"];
            const logoPanels = ["LogoPanel"];
            const stitchingPanels = ["Stitching"];

            setInterval(() => {
                const currentCombo = designCombos[comboIndex];

                materials.forEach(material => {
                    if (leftSide.includes(material.name)) {
                        material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.leftPanels);
                    }
                    if (rightSide.includes(material.name)) {
                        material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.rightPanels);
                    }
                    if (midLeftPanel.includes(material.name)) {
                        material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.midLeft);
                    }
                    if (midRightPanel.includes(material.name)) {
                        material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.midRight);
                    }
                    if (woodbandPanels = waistbandPanels.includes(material.name)) { // Fix minor typo handling
                        material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.waistband);
                    }
                    if (waistbandPanels.includes(material.name)) {
                        material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.waistband);
                    }
                    if (trimPanels.includes(material.name)) {
                        material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.trim);
                    }
                    if (logoPanels.includes(material.name)) {
                        material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.logo);
                    }
                    if (stitchingPanels.includes(material.name)) {
                        material.pbrMetallicRoughness.setBaseColorFactor(currentCombo.stitching);
                    }
                });

                comboIndex = (comboIndex + 1) % designCombos.length;
            }, 1200);
        });
    </script>
</body>
</html>
