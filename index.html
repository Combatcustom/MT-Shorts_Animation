<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CombatCustom Shorts Color Loop</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        model-viewer {
            width: 100%;
            height: 90vh;
            max-width: 800px;
            --poster-color: transparent;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="shortsViewer" 
        src="MT SHORTS.glb" 
        alt="CombatCustom Muay Thai Shorts" 
        auto-rotate 
        rotation-per-second="60deg"
        camera-controls 
        interaction-prompt="none"
        shadow-intensity="1">
    </model-viewer>

    <div class="controls-hint">Ready to screen record. Colors switch every 1.2 seconds.</div>

    <script>
        const viewer = document.querySelector("#shortsViewer");

        // 🎨 Customize your color loops here (Red, Green, Blue, Alpha/Transparency from 0.0 to 1.0)
        const colorPalette = [
            [0.1, 0.1, 0.1, 1.0],      // Matte Black
            [0.85, 0.65, 0.13, 1.0],   // Muay Thai Gold
            [0.8, 0.05, 0.05, 1.0],    // Combat Red
            [0.05, 0.2, 0.7, 1.0],     // Royal Blue
            [0.95, 0.95, 0.95, 1.0],   // Crisp White
            [0.3, 0.3, 0.3, 1.0]       // Gunmetal Charcoal
        ];

        let colorIndex = 0;

        viewer.addEventListener("load", () => {
            const materials = viewer.model.materials;

            // Target mesh names taken directly from your model configurator screenshot
            const targetPanels = [
                "BackLeftPanel",
                "BackRightPanel",
                "MidRightPanel",
                "MidLeftPanel",
                "FrontRightPanel",
                "FrontLeftPanel"
            ];

            // Auto-cycle the colors smoothly
            setInterval(() => {
                const nextColor = colorPalette[colorIndex];

                materials.forEach(material => {
                    if (targetPanels.includes(material.name)) {
                        material.pbrMetallicRoughness.setBaseColorFactor(nextColor);
                    }
                });

                colorIndex = (colorIndex + 1) % colorPalette.length;
            }, 1200);
        });
    </script>
</body>
</html>
