<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Shorts Customizer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* 3D Canvas Styling */
        model-viewer {
            width: 100%;
            max-width: 600px;
            height: 500px;
            background-color: #242424;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .controls {
            margin-top: 20px;
            color: #ffffff;
            text-align: center;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="shorts-viewer" 
        src="MTSHORTS-v1.glb" 
        alt="3D Custom Combat Shorts" 
        camera-controls 
        auto-rotate
        shadow-intensity="1">
    </model-viewer>

    <div class="controls">
        <h3>Customizer Loop Active</h3>
        <p>Swapping colors and logos smoothly every 1.4 seconds.</p>
    </div>

    <script>
        const viewer = document.getElementById('shorts-viewer');

        // Assets Configuration Array
        const designCycle = [
            { color: [0.8, 0.1, 0.1, 1.0], logo: 'logo-kicker-black.png' }, // Red shorts / Black Logo
            { color: [0.1, 0.1, 0.8, 1.0], logo: 'logo-kicker-white.png' }  // Blue shorts / White Logo
        ];

        let currentIndex = 0;

        // Core Texture Swap Loop Engine
        async function runCustomizerLoop() {
            // Ensure 3D materials are completely loaded into browser memory
            if (!viewer.model || !viewer.model.materials) return;

            const currentDesign = designCycle[currentIndex];

            // 1. Cycle Background Fabric Base Color
            const baseMaterial = viewer.model.materials.find(m => m.name === 'FrontLeftPanel');
            if (baseMaterial) {
                baseMaterial.pbrMetallicRoughness.setBaseColorFactor(currentDesign.color);
            }

            // 2. Cycle Custom Logo Texture Maps onto your newly fixed slot
            const logoMaterial = viewer.model.materials.find(m => m.name === 'LogoPanel');
            if (logoMaterial) {
                try {
                    // Pull texture data dynamically out of GitHub repository directories
                    const texture = await viewer.createTexture(currentDesign.logo);
                    
                    if (logoMaterial.pbrMetallicRoughness && logoMaterial.pbrMetallicRoughness.baseColorTexture) {
                        logoMaterial.pbrMetallicRoughness.baseColorTexture.setTexture(texture);
                    }
                } catch (error) {
                    console.error("Texture tracking error for file:", currentDesign.logo, error);
                }
            }

            // Move to next configuration block in array index loop
            currentIndex = (currentIndex + 1) % designCycle.length;
        }

        // Trigger loop cycle sync sequence once model is fully parsed by renderer
        viewer.addEventListener('load', () => {
            console.log("3D Asset pipeline connected. Executing color loops...");
            setInterval(runCustomizerLoop, 1400);
        });
    </script>

</body>
</html>
