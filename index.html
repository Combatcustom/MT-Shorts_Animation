<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Shorts Customizer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Clean, centered 3D frame wrapper */
        .viewer-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 500px;
            background-color: #242424;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        model-viewer {
            width: 100%;
            height: 100%;
        }

        .controls {
            margin-top: 20px;
            color: #ffffff;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="viewer-container">
        <model-viewer 
            id="shorts-viewer" 
            src="MT SHORTS.glb" 
            alt="3D Custom Combat Shorts" 
            auto-rotate
            rotation-per-second="40deg"
            shadow-intensity="1">
        </model-viewer>
    </div>

    <div class="controls">
        <h3>True 3D Texture Binding Active</h3>
        <p>Logos are mapped natively onto the spinning waistband patch.</p>
    </div>

    <script>
        const viewer = document.getElementById('shorts-viewer');

        // Clean Red/Black and Blue/White color-space decimals
        const designCycle = [
            { color: [0.8, 0.05, 0.05, 1.0], logo: 'logo-kicker-black.png' }, // Red Fabric / Black Logo
            { color: [0.05, 0.05, 0.8, 1.0], logo: 'logo-kicker-white.png' }  // Blue Fabric / White Logo
        ];

        let currentIndex = 0;

        async function runCustomizerLoop() {
            if (!viewer.model || !viewer.model.materials) return;

            const currentDesign = designCycle[currentIndex];

            // 1. Loop through all fabric pieces to apply base colors
            viewer.model.materials.forEach(material => {
                if (material.name !== 'LogoPanel' && material.pbrMetallicRoughness) {
                    material.pbrMetallicRoughness.setBaseColorFactor(currentDesign.color);
                }
            });

            // 2. Map the logo image directly onto the 3D waistband patch mesh
            const logoMaterial = viewer.model.materials.find(m => m.name === 'LogoPanel');
            if (logoMaterial && logoMaterial.pbrMetallicRoughness) {
                try {
                    // Force-create a true WebGL texture tracking map from your image files
                    const texture = await viewer.createTexture(currentDesign.logo);
                    
                    // Inject it natively into the material's color slot
                    if (logoMaterial.pbrMetallicRoughness.baseColorTexture) {
                        logoMaterial.pbrMetallicRoughness.baseColorTexture.setTexture(texture);
                    } else {
                        // If slot is uninitialized, bind it dynamically directly to the color channel
                        logoMaterial.pbrMetallicRoughness.setBaseColorFactor([1, 1, 1, 1]); 
                        logoMaterial.pbrMetallicRoughness.baseColorTexture = { setTexture: (t) => logoMaterial.pbrMetallicRoughness.baseColorTexture = t };
                        logoMaterial.pbrMetallicRoughness.baseColorTexture.setTexture(texture);
                    }
                } catch (err) {
                    console.error("3D Canvas binding failed for image source:", currentDesign.logo, err);
                }
            }

            currentIndex = (currentIndex + 1) % designCycle.length;
        }

        // Run the sequence immediately when the 3D scene finishes loading
        viewer.addEventListener('load', () => {
            console.log("3D Engine Ready. Running true material swaps...");
            setInterval(runCustomizerLoop, 1400);
        });
    </script>

</body>
</html>
